<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule a Meeting — SmokingTigers.Enterprises</title>
  <meta name="description" content="Schedule time with the SmokingTigers.Enterprises team to discuss your project or partnership opportunity." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .page-hero {
      max-width: 1080px; margin: 0 auto;
      padding: 8rem 3rem 3rem;
    }
    .page-eyebrow {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .page-eyebrow::before {
      content: ''; display: block; width: 2.5rem; height: 1px; background: var(--gold);
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400; line-height: 1.1;
      margin-bottom: 1rem;
    }
    .sub {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.65;
      max-width: 480px;
      margin-bottom: 3rem;
    }
    .cal-wrap {
      width: 100%; min-height: 700px;
      border: 1px solid var(--border);
      background: var(--bg-2);
    }
    .cal-wrap iframe {
      width: 100%; min-height: 700px;
      border: none; display: block;
    }
    @media (max-width: 768px) {
      .page-hero { padding: 7rem 1.5rem 2rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">Smoking<span>Tigers</span>.Enterprises</a>
    <div class="nav-links">
      <a class="nav-link" href="/">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-right:0.25rem"><path d="M10 6H2M5 2L1 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
      </a>
    </div>
  </nav>

  <main>
    <section class="page-hero">
      <p class="page-eyebrow"><span class="label">Let's Talk</span></p>
      <h1>Schedule a Meeting</h1>
      <p class="sub">Book time with our team to discuss your project, explore partnership opportunities, or inquire about joining the cooperative.</p>
      <div class="cal-wrap">
        <iframe src="https://cal.smokingtigers.enterprises/ed/project" title="Schedule a meeting with SmokingTigers.Enterprises"></iframe>
      </div>
    </section>
  </main>

  <footer>
    <p class="footer-brand">Smoking<span>Tigers</span>.Enterprises</p>
    <p class="footer-note">© 2026 SmokingTigers.Enterprises. All rights reserved.</p>
  </footer>
</body>
</html>
