<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule a Meeting — Smoking Tigers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #0a0a0a; --white: #fafafa; --blue: #1a3a6b; --blue-light: #2a5298; --muted: #6b6b6b; }
    body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .nav-logo { font-size: 1rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--white); text-decoration: none; }
    .nav-logo span { color: var(--blue-light); }
    .nav-back { font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.2s; }
    .nav-back:hover { color: var(--white); }
    .hero { max-width: 960px; margin: 0 auto; padding: 4rem 2.5rem 2rem; }
    .eyebrow { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--blue-light); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem; }
    .eyebrow::before { content: ''; display: block; width: 2rem; height: 1px; background: var(--blue-light); }
    h1 { font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 1rem; }
    .sub { font-size: 1rem; color: rgba(255,255,255,0.5); line-height: 1.6; max-width: 480px; margin-bottom: 3rem; }
    .cal-wrap { width: 100%; min-height: 700px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02); }
    .cal-wrap iframe { width: 100%; min-height: 700px; border: none; display: block; }
    footer { max-width: 960px; margin: 3rem auto 0; padding: 2rem 2.5rem; border-top: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; }
    .footer-brand { font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .footer-brand span { color: var(--blue-light); }
    .footer-note { font-size: 0.75rem; color: rgba(255,255,255,0.2); }
    @media (max-width: 600px) { nav, .hero, footer { padding-left: 1.25rem; padding-right: 1.25rem; } }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">Smoking <span>Tigers</span></a>
    <a class="nav-back" href="/">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10 6H2M5 2L1 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </a>
  </nav>
  <section class="hero">
    <p class="eyebrow">Let's talk</p>
    <h1>Schedule a Meeting</h1>
    <p class="sub">Book time with the Smoking Tigers team. Pick a slot that works for you.</p>
    <div class="cal-wrap">
      <iframe src="https://cal.smokingtigers.enterprises/ed/project" title="Schedule a meeting"></iframe>
    </div>
  </section>
  <footer>
    <p class="footer-brand">Smoking <span>Tigers</span></p>
    <p class="footer-note">© 2026 Smoking Tigers Media</p>
  </footer>
</body>
</html>
